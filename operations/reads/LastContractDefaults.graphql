query LastContractDefaults($accountId: ID!) {
  lastContractDefaults(accountId: $accountId) {
    sourceContractId
    currencyCode
    billToContactId
    billToAddressId
    billToAccountId
    customerAccountId
    shipToAddressId
    shipToContactId
    termUOM
    termQuantity
    autoRenew
    quoteLines {
      productId
      quantity
    }
  }
}
